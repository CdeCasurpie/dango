name: Build executables

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset: linux_asset
            game: linux_game
            zip: Linux.zip

          - os: windows-latest
            asset: win_asset.exe
            game: windows_game.exe
            zip: Windows.zip

          - os: macos-latest
            asset: mac_asset
            game: mac_game
            zip: macOS.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r req.txt

      - name: Build encrypt_module/main.py
        run: |
          pyinstaller --clean --onefile encrypt_module/main.py

      - name: Build game.py
        run: |
          pyinstaller --clean --onefile game.py

      - name: Copy binaries (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p assets/binaries
          mkdir -p assets/games_bin

          cp dist/main assets/binaries/${{ matrix.asset }}
          cp dist/game assets/games_bin/${{ matrix.game }}

      - name: Copy binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force assets\binaries
          New-Item -ItemType Directory -Force assets\games_bin

          Copy-Item dist\main.exe assets\binaries\${{ matrix.asset }}
          Copy-Item dist\game.exe assets\games_bin\${{ matrix.game }}

      - name: Create ZIP (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          zip -r "${{ matrix.zip }}" assets

      - name: Create ZIP (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path assets `
            -DestinationPath "${{ matrix.zip }}"

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}
          path: ${{ matrix.zip }}